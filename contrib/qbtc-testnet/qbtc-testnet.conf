# QuantumBTC Testnet Configuration
# Place this file at ~/.bitcoin/bitcoin.conf or use -conf= to specify.
#
# Network: qbtctestnet
# Port: 28333 (P2P), 28332 (RPC)
# Bech32 prefix: qbtct1...
# DAG mode: enabled (GHOSTDAG K=32)
# PQC: hybrid signing enabled, Falcon default for new keys
# Block target: 10 seconds

# ── Chain selection ──────────────────────────────────────────────────
chain=qbtctestnet

# ── Network ──────────────────────────────────────────────────────────
# Listen for incoming connections
listen=1
discover=1
dnsseed=1

# Accept connections from outside (set to 0 if behind NAT without forwarding)
#listenonion=0

# Bootstrap seed nodes
seednode=46.62.156.169:28333
seednode=37.27.47.236:28333
seednode=89.167.109.241:28333

# Persistent peers for better convergence
addnode=46.62.156.169:28333
addnode=37.27.47.236:28333
addnode=89.167.109.241:28333

# ── RPC ──────────────────────────────────────────────────────────────
server=1
rpcbind=127.0.0.1
rpcallowip=127.0.0.1

# Set RPC credentials (CHANGE THESE)
#rpcuser=qbtcuser
#rpcpassword=qbtcpassword

# Or use cookie authentication (default, recommended):
# RPC cookie is auto-created at ~/.bitcoin/qbtctestnet/.cookie

# ── Wallet ───────────────────────────────────────────────────────────
# Enable wallet support
#disablewallet=0

# Fallback fee rate (sat/vB) when estimation is unavailable
fallbackfee=0.0001

# ── Mining ───────────────────────────────────────────────────────────
# Uncomment to enable solo mining (set your address)
#mineraddress=qbtct1q...

# ── Performance ──────────────────────────────────────────────────────
# Database cache (MB)
dbcache=512

# Maximum mempool size (MB)
maxmempool=300

# Good default peer capacity for home nodes
maxconnections=32

# Signature verification cache size (MB)
maxsigcachesize=32

# Pruned mode keeps storage bounded for home operators
prune=10000

# ── Logging ──────────────────────────────────────────────────────────
# Enable debug categories (comma-separated)
#debug=dag
#debug=pqc
#debug=net
#debug=rpc

# Log timestamps
logtimestamps=1

# ── Indexing ─────────────────────────────────────────────────────────
# Transaction index (enables getrawtransaction for all txs)
txindex=1
