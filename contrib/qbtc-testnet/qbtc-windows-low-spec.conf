# QuantumBTC Windows Low-Spec Node Profile
# Recommended for older Windows PCs joining qbtctestnet.
# Location: %LOCALAPPDATA%\Bitcoin\bitcoin.conf

chain=qbtctestnet

[qbtctestnet]
# Core node behavior
server=1
listen=1
discover=1
dnsseed=1

# Keep startup forgiving on weaker hardware
prune=5500
dbcache=128
maxmempool=150
maxconnections=16
maxsigcachesize=16

# Wallet / relay
fallbackfee=0.0001
txindex=0

# Local RPC only
rpcbind=127.0.0.1
rpcallowip=127.0.0.1

# Bootstrap peers
seednode=46.62.156.169:28333
seednode=37.27.47.236:28333
seednode=89.167.109.241:28333

# Persistent high-quality peers to reduce lag after restart
addnode=46.62.156.169:28333
addnode=37.27.47.236:28333
addnode=89.167.109.241:28333

# Logging
logtimestamps=1
